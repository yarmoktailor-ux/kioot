<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم اليرموك - إيلين</title>
    <style>
        :root {
            --bg-dark: #1e293b;
            --sidebar-dark: #111827;
            --accent-teal: #14b8a6;
            --text-white: #f8fafc;
            --card-bg: #33415550;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-dark);
            color: var(--text-white);
        }
        /* القائمة الجانبية - Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-dark);
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: fixed;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-teal);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
        }
        .menu-item:hover, .active {
            background-color: var(--card-bg);
        }
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 260px;
            padding: 30px;
            width: 100%;
        }
        .header-title {
            margin-bottom: 30px;
        }
        .header-title h1 { font-size: 1.8rem; margin: 0; }
        .header-title p { color: #94a3b8; margin: 5px 0; }

        /* الكروت الإحصائية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #475569;
        }
        .stat-card h3 { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 10px; }
        .stat-card .value { font-size: 1.5rem; font-weight: bold; }

        .pro-badge {
            background: #eab308;
            color: black;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <span>إيلين</span>
        </div>
        <div class="menu-item active">لوحة التحكم</div>
        <div class="menu-item">الطلبات <span>⌄</span></div>
        <div class="menu-item">الكتالوج <span>⌄</span></div>
        <div class="menu-item">العملاء <span>⌄</span></div>
        <div class="menu-item">إعدادات الشحن</div>
        <div class="menu-item">تخصيص الثيم <span class="pro-badge">PRO</span></div>
        
        <div style="margin-top: 50px; border-top: 1px solid #334155; padding-top: 20px;">
            <p style="font-size: 0.8rem; color: #94a3b8;">اليرموك للخياطة الرجالية</p>
        </div>
    </div>

    <div class="main-content">
        <div class="header-title">
            <h1>لوحة التحكم</h1>
            <p>صباح الخير، اليرموك للخياطة الرجالية</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>اجمالي مبيعات المتجر</h3>
                <div class="value">0.00 ر.ي</div>
            </div>
            <div class="stat-card">
                <h3>اجمالي العملاء</h3>
                <div class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>اجمالي الطلبات</h3>
                <div class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>اجمالي المنتجات</h3>
                <div class="value">7</div>
            </div>
        </div>
    </div>

</body>
</html>
