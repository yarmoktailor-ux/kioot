<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ المتاجر | لوحة التحكم</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            height: 100vh;
            padding: 20px;
            position: fixed;
            border-left: 1px solid #334155;
        }
        .sidebar h2 { color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .menu-link {
            padding: 15px;
            display: block;
            color: var(--text);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .menu-link:hover { background: #334155; }
        .active { background: var(--accent); color: var(--bg); font-weight: bold; }

        /* Main Content */
        .content { margin-right: 280px; padding: 40px; width: 100%; }
        .card {
            background: var(--sidebar);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--bg);
            color: white;
            box-sizing: border-box;
        }
        .btn-create {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        .store-status {
            margin-top: 30px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 8px;
            display: none; /* يظهر عند الضغط على إنشاء */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>منشئ المتاجر v1</h2>
        <a href="#" class="menu-link active">إنشاء متجر جديد</a>
        <a href="#" class="menu-link">متاجرى الحالية</a>
        <a href="#" class="menu-link">إحصائيات المنصة</a>
        <a href="#" class="menu-link">الإعدادات البرمجية</a>
    </div>

    <div class="content">
        <h1>مرحباً بك في معمل المتاجر</h1>
        <p style="color: #94a3b8;">من هنا يمكنك إطلاق متجر جديد لمحل اليرموك أو أي علامة تجارية أخرى في ثوانٍ.</p>

        <div class="card">
            <h3>بيانات المتجر الجديد</h3>
            <div class="form-group">
                <label>اسم المتجر</label>
                <input type="text" placeholder="مثلاً: اليرموك للخياطة الرجالية">
            </div>
            <div class="form-group">
                <label>رابط المتجر (Subdomain)</label>
                <input type="text" placeholder="yarmok-tailor">
            </div>
            <div class="form-group">
                <label>نوع النشاط</label>
                <select>
                    <option>خياطة وتفصيل</option>
                    <option>ملابس جاهزة</option>
                    <option>بيع أقمشة</option>
                </select>
            </div>
            <button class="btn-create" onclick="showStatus()">تفعيل المتجر الآن</button>

            <div id="status" class="store-status">
                ✅ جاري تهيئة قاعدة البيانات... تم إنشاء رابط: <br>
                <strong>https://yarmok-tailor.mystore.com</strong>
            </div>
        </div>
    </div>

    <script>
        function showStatus() {
            document.getElementById('status').style.display = 'block';
        }
    </script>

</body>
</html>
